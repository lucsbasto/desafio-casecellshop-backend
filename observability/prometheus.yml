# Prometheus: coleta as métricas que o app já expõe em /metrics (prom-client).
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: casecellshop-app
    metrics_path: /metrics
    static_configs:
      - targets: ['app:3000']
        labels:
          service: casecellshop-backend

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
