# OpenTelemetry Collector — papel equivalente ao Datadog Agent.
# Recebe os traces do app via OTLP e os reexporta para o Jaeger (visualização APM).
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 2s

exporters:
  # Visualização de traces (equivalente ao Datadog APM).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Eco no log do collector — útil para depurar a chegada dos spans.
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
